<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adoro Amanhecer</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    text-align:center;
    color:#d4af37;
    background: radial-gradient(circle at center, #0b1c2d 0%, #050b14 70%);
    overflow:hidden;
}

h1{margin-top:20px;font-size:clamp(24px,5vw,40px);}

canvas{
    display:block;
    margin:auto;
}

footer{
    position:fixed;
    bottom:10px;
    width:100%;
    font-size:12px;
    opacity:0.8;
}
</style>
</head>
<body>

<h1>Adoro Amanhecer</h1>
<h3>{{ hoje.strftime("%d/%m/%Y") }}</h3>

<canvas id="clock"></canvas>

<footer>
© 2026 Adoro Amanhecer
</footer>

<script>

const diasRegencia = {{ dias_regencia | tojson }};
const diasNoMes = {{ dias_no_mes }};
const hojeDia = {{ hoje.day }};

const canvas = document.getElementById("clock");
const ctx = canvas.getContext("2d");

let angle = 0;

function resizeCanvas() {
    const size = Math.min(window.innerWidth * 0.9, 700);
    canvas.width = size;
    canvas.height = size;
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function draw(){

    const size = canvas.width;
    const center = size / 2;
    const haloRadius = size * 0.38;
    const numberRadius = size * 0.32;
    const sunRadius = size * 0.12;

    ctx.clearRect(0,0,size,size);

    const passo = (Math.PI*2)/31;

    // Halo dourado girando
    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(angle);
    ctx.strokeStyle="#b7950b";
    ctx.lineWidth= size * 0.01;
    ctx.beginPath();
    ctx.arc(0,0,haloRadius,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();

    // Números com janelas redondas da regência
    ctx.font = `bold ${size*0.03}px Segoe UI`;
    ctx.textAlign="center";
    ctx.textBaseline="middle";

    for(let i=1;i<=31;i++){
        if(i>diasNoMes) continue;

        const ang = passo*(i-1) - Math.PI/2;
        const x = center + numberRadius*Math.cos(ang);
        const y = center + numberRadius*Math.sin(ang);

        if(diasRegencia.includes(i)){
            ctx.beginPath();
            ctx.arc(x, y, size*0.04, 0, Math.PI*2);
            ctx.fillStyle = "#00bfff";
            ctx.shadowColor="#00bfff";
            ctx.shadowBlur=size*0.03;
            ctx.fill();
            ctx.shadowBlur=0;

            ctx.fillStyle="#ffffff";
        }
        else if(i===hojeDia){
            ctx.fillStyle="#ffffff";
        }
        else{
            ctx.fillStyle="#d4af37";
        }

        ctx.fillText(i,x,y);
    }

    // Sol fixo
    const grad = ctx.createRadialGradient(center,center,10,center,center,sunRadius);
    grad.addColorStop(0,"#fff3a3");
    grad.addColorStop(1,"#b7950b");

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(center,center,sunRadius,0,Math.PI*2);
    ctx.fill();

    angle += 0.0007;

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
